name: 🔔 Build APK — Çan Saati

on:
  push:
    branches:
      - main
      - claude/session-5C8xJ
  workflow_dispatch:

jobs:
  build:
    name: Android APK Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Android platform, build-tools ve NDK kur
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" "ndk;26.1.10909125"

      - name: npm install
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: '1'

      - name: Gradlew izni ver
        run: chmod +x android/gradlew

      - name: Ortam bilgisi
        run: |
          echo "=== Bellek ==="
          free -h
          echo "=== Disk ==="
          df -h /
          echo "=== Java ==="
          java -version
          echo "=== NDK ==="
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "NDK dizini bulunamadi"
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          echo "=== Gradle wrapper ==="
          cat android/gradle/wrapper/gradle-wrapper.properties | grep distributionUrl

      - name: APK build et (Debug)
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
          exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=1 -Xmx4g -XX:MaxMetaspaceSize=512m'
          JAVA_OPTS: '-Xmx2g'

      - name: Hata logunu göster
        if: failure()
        run: |
          echo "=== Son 200 satır ==="
          tail -200 /tmp/gradle-build.log || true
          echo "=== EXCEPTION içeren satırlar ==="
          grep -i "exception\|error\|failed\|could not" /tmp/gradle-build.log | tail -50 || true

      - name: Hata özetini Step Summary'e yaz
        if: failure()
        run: |
          echo "## ❌ Gradle Build Hatası" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/gradle-build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Log dosyası bulunamadı"
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Gradle log artifact (hata durumunda)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-error-log
          path: /tmp/gradle-build.log
          retention-days: 3

      - name: APK bilgisini göster
        run: find android/app/build/outputs/apk -name "*.apk" -exec du -sh {} \;

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: CanSaati-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build özeti
        if: success()
        run: |
          echo "## ✅ Çan Saati APK Hazır!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts** bölümünden **CanSaati-APK** dosyasını indirin." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Kurulum" >> $GITHUB_STEP_SUMMARY
          echo "1. APK'yı Android cihazınıza aktarın" >> $GITHUB_STEP_SUMMARY
          echo "2. Ayarlar → Bilinmeyen kaynaklar → İzin ver" >> $GITHUB_STEP_SUMMARY
          echo "3. APK dosyasına dokunun ve kurun" >> $GITHUB_STEP_SUMMARY
