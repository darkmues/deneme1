name: 🔔 Build APK — Çan Saati

on:
  push:
    branches:
      - main
      - claude/session-5C8xJ
  workflow_dispatch:

jobs:
  build:
    name: Android APK Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Android platform ve build-tools kur
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: npm install
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: '1'

      - name: Gradlew izni ver
        run: chmod +x android/gradlew

      - name: APK build et (Debug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx3g'

      - name: APK bilgisini göster
        run: find android/app/build/outputs/apk -name "*.apk" -exec du -sh {} \;

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: CanSaati-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build özeti
        if: success()
        run: |
          echo "## ✅ Çan Saati APK Hazır!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts** bölümünden **CanSaati-APK** dosyasını indirin." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Kurulum" >> $GITHUB_STEP_SUMMARY
          echo "1. APK'yı Android cihazınıza aktarın" >> $GITHUB_STEP_SUMMARY
          echo "2. Ayarlar → Bilinmeyen kaynaklar → İzin ver" >> $GITHUB_STEP_SUMMARY
          echo "3. APK dosyasına dokunun ve kurun" >> $GITHUB_STEP_SUMMARY
