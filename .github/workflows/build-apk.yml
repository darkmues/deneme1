name: 🔔 Build APK — Çan Saati

on:
  push:
    branches:
      - main
      - claude/session-5C8xJ
  workflow_dispatch:

jobs:
  build:
    name: Android APK Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Android platform, build-tools ve NDK kur
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" "ndk;26.1.10909125"

      - name: npm install
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: '1'

      - name: Gradlew izni ver
        run: chmod +x android/gradlew

      - name: Gradle Java toolchain yolu ayarla
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.java.installations.paths=$JAVA_HOME" >> ~/.gradle/gradle.properties
          echo "org.gradle.java.installations.auto-download=false" >> ~/.gradle/gradle.properties
          # foojay-resolver CI ortamında engellidir — included build'den kaldır
          sed -i '/foojay-resolver-convention/d' node_modules/@react-native/gradle-plugin/settings.gradle.kts
          # jvmToolchain(17) CI'da Gradle'ın Java 17'yi bulamamasına neden olur
          find node_modules/@react-native/gradle-plugin -name "*.gradle.kts" \
            -exec sed -i 's/kotlin { jvmToolchain(17) }/\/\/ jvmToolchain patched for CI/g' {} +
          echo "JAVA_HOME=$JAVA_HOME"
          echo "Toolchain config:"
          cat ~/.gradle/gradle.properties

      - name: Ortam bilgisi
        run: |
          echo "=== Bellek ==="
          free -h
          echo "=== Disk ==="
          df -h /
          echo "=== Java ==="
          java -version
          echo "=== NDK ==="
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "NDK dizini bulunamadi"
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          echo "=== Gradle wrapper ==="
          cat android/gradle/wrapper/gradle-wrapper.properties | grep distributionUrl

      - name: Gradle versiyon kontrol
        working-directory: android
        run: ./gradlew --version
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Xmx4g -XX:MaxMetaspaceSize=512m'
          JAVA_OPTS: '-Xmx2g'

      - name: APK build et (Debug)
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.kotlinVersion=1.9.24 \
            2>&1 | tee /tmp/gradle-build.log
          exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx4g -XX:MaxMetaspaceSize=512m'
          JAVA_OPTS: '-Xmx2g'

      - name: Hata logunu göster
        if: failure()
        run: |
          echo "=== İlk 100 satır ==="
          head -100 /tmp/gradle-build.log || true
          echo "=== Son 200 satır ==="
          tail -200 /tmp/gradle-build.log || true
          echo "=== EXCEPTION içeren satırlar ==="
          grep -i "exception\|error\|failed\|could not\|cannot" /tmp/gradle-build.log | tail -50 || true

      - name: Hata özetini Step Summary'e yaz
        if: failure()
        run: |
          echo "## ❌ Gradle Build Hatası" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tam Gradle Logu" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/gradle-build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Log dosyası bulunamadı — assembleDebug başlamadı"
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Hata logunu repoya yaz
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI Bot"
          cp /tmp/gradle-build.log ci-gradle-error.txt 2>/dev/null || echo "Log yok" > ci-gradle-error.txt
          git add ci-gradle-error.txt
          git commit -m "ci: hata logu [skip ci]" || true
          git push origin HEAD:${{ github.ref_name }} || true

      - name: Gradle log artifact (hata durumunda)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-error-log
          path: /tmp/gradle-build.log
          retention-days: 3

      - name: APK bilgisini göster
        run: find android/app/build/outputs/apk -name "*.apk" -exec du -sh {} \;

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: CanSaati-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build özeti
        if: success()
        run: |
          echo "## ✅ Çan Saati APK Hazır!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts** bölümünden **CanSaati-APK** dosyasını indirin." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Kurulum" >> $GITHUB_STEP_SUMMARY
          echo "1. APK'yı Android cihazınıza aktarın" >> $GITHUB_STEP_SUMMARY
          echo "2. Ayarlar → Bilinmeyen kaynaklar → İzin ver" >> $GITHUB_STEP_SUMMARY
          echo "3. APK dosyasına dokunun ve kurun" >> $GITHUB_STEP_SUMMARY
