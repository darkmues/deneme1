name: 🔔 Build APK — Çan Saati

on:
  push:
    branches:
      - main
      - claude/session-5C8xJ
  workflow_dispatch:

jobs:
  build:
    name: Android APK Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: CI başladı bildirimi
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 14,
              body: `🔄 CI başladı — run [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });

      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Android platform, build-tools ve NDK kur
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" "ndk;26.1.10909125"

      - name: npm install
        run: npm install --legacy-peer-deps 2>&1 | tee /tmp/npm-install.log; exit ${PIPESTATUS[0]}

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean 2>&1 | tee /tmp/expo-prebuild.log; exit ${PIPESTATUS[0]}
        env:
          EXPO_NO_TELEMETRY: '1'

      - name: Gradlew izni ver
        run: chmod +x android/gradlew

      - name: Gradle Java toolchain yolu ayarla
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.java.installations.paths=$JAVA_HOME" >> ~/.gradle/gradle.properties
          echo "org.gradle.java.installations.fromEnv=JAVA_HOME" >> ~/.gradle/gradle.properties
          echo "org.gradle.java.installations.auto-download=false" >> ~/.gradle/gradle.properties
          sed -i '/foojay-resolver-convention/d' node_modules/@react-native/gradle-plugin/settings.gradle.kts
          find node_modules/@react-native/gradle-plugin -name "*.gradle.kts" \
            -exec sed -i '/jvmToolchain/d' {} +
          echo "=== jvmToolchain kalan ==="
          grep -r "jvmToolchain" node_modules/@react-native/gradle-plugin/ --include="*.gradle.kts" || echo "Temiz — jvmToolchain kalmadi"
          echo "JAVA_HOME=$JAVA_HOME"
          cat ~/.gradle/gradle.properties

      - name: android/gradle.properties yamaları
        run: |
          echo "kotlin.jvm.target.validation.mode=warning" >> android/gradle.properties
          echo "org.gradle.java.installations.paths=$JAVA_HOME" >> android/gradle.properties
          echo "org.gradle.java.installations.fromEnv=JAVA_HOME" >> android/gradle.properties
          echo "org.gradle.java.installations.auto-download=false" >> android/gradle.properties
          echo "=== android/gradle.properties son satirlar ==="
          tail -6 android/gradle.properties

      - name: Ortam bilgisi
        run: |
          echo "=== Bellek ==="
          free -h
          echo "=== Disk ==="
          df -h /
          echo "=== Java ==="
          java -version
          echo "=== NDK ==="
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "NDK dizini bulunamadi"
          echo "=== Gradle wrapper ==="
          cat android/gradle/wrapper/gradle-wrapper.properties | grep distributionUrl

      - name: Gradle versiyon kontrol
        working-directory: android
        run: ./gradlew --version 2>&1 | tee /tmp/gradlew-version.log; exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Xmx4g -XX:MaxMetaspaceSize=512m'
          JAVA_OPTS: '-Xmx2g'

      - name: APK build et (Debug)
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.kotlinVersion=1.9.24 \
            2>&1 | tee /tmp/gradle-build.log
          exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx4g -XX:MaxMetaspaceSize=512m'
          JAVA_OPTS: '-Xmx2g'

      - name: Hata logunu PR yorumu olarak yaz
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { readFileSync } = require('fs');
            const logs = [
              ['/tmp/npm-install.log', 'NPM Install (son 50 satir)', 50],
              ['/tmp/expo-prebuild.log', 'Expo Prebuild', 300],
              ['/tmp/gradlew-version.log', 'Gradlew Version', 100],
              ['/tmp/gradle-build.log', 'Gradle Build (son 400 satir)', 400],
            ];
            let body = '## ❌ Build Hatası\n```\n';
            for (const [path, name, lines] of logs) {
              body += `\n=== ${name} ===\n`;
              try {
                const content = readFileSync(path, 'utf8');
                const lineArr = content.split('\n');
                body += lineArr.slice(-lines).join('\n');
              } catch(e) {
                body += 'log yok';
              }
            }
            body += '\n```';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 14,
              body: body.slice(0, 65000)
            });

      - name: CI log artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-error-logs
          path: |
            /tmp/npm-install.log
            /tmp/expo-prebuild.log
            /tmp/gradlew-version.log
            /tmp/gradle-build.log
          retention-days: 3

      - name: APK bilgisini göster
        run: find android/app/build/outputs/apk -name "*.apk" -exec du -sh {} \;

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: CanSaati-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build özeti
        if: success()
        run: |
          echo "## ✅ Çan Saati APK Hazır!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts** bölümünden **CanSaati-APK** dosyasını indirin." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Kurulum" >> $GITHUB_STEP_SUMMARY
          echo "1. APK'yı Android cihazınıza aktarın" >> $GITHUB_STEP_SUMMARY
          echo "2. Ayarlar → Bilinmeyen kaynaklar → İzin ver" >> $GITHUB_STEP_SUMMARY
          echo "3. APK dosyasına dokunun ve kurun" >> $GITHUB_STEP_SUMMARY

